services:
  - type: web
    name: jiujitsology
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    previewsEnabled: true
    envVars:
      - key: SENTRY_DSN
        sync: false
      - key: NODE_VERSION
        value: "22"
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPOSITORY
        sync: false
